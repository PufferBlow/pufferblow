services:
  pufferblow-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pufferblow-server
    restart: unless-stopped
    ports:
      - "7575:7575"
    environment:
      # If empty, the server falls back to config.toml in pufferblow_data.
      # The default below assembles a URI against the bundled postgres
      # service using the values you set in .env, so a fresh stack works
      # out of the box.
      PUFFERBLOW_DATABASE_URI: ${PUFFERBLOW_DATABASE_URI:-postgresql://${POSTGRES_USER:-pufferblow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pufferblow}}
      PUFFERBLOW_API_HOST: ${PUFFERBLOW_API_HOST:-0.0.0.0}
      PUFFERBLOW_API_PORT: ${PUFFERBLOW_API_PORT:-7575}
    volumes:
      - pufferblow_data:/root/.pufferblow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /readyz mirrors instance health: returns 200 once the API has
      # finished bootstrap (DB connect + manager wiring). media-sfu waits
      # on this rather than `service_started` so it doesn't race past
      # the bootstrap callback endpoint not being ready yet.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7575/readyz', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pufferblow-server-net

  media-sfu:
    build:
      context: ${MEDIA_SFU_GIT_CONTEXT:-https://github.com/pufferblow/media-sfu.git}
      dockerfile: Dockerfile
    container_name: pufferblow-media-sfu
    restart: unless-stopped
    command: ["-config", "/root/.pufferblow/config.toml"]
    ports:
      - "8787:8787"
      - "${RTC_UDP_PORT_MIN:-50000}-${RTC_UDP_PORT_MAX:-50199}:${RTC_UDP_PORT_MIN:-50000}-${RTC_UDP_PORT_MAX:-50199}/udp"
    volumes:
      - pufferblow_data:/root/.pufferblow
    depends_on:
      pufferblow-server:
        condition: service_healthy
    networks:
      - pufferblow-server-net

  coturn:
    image: instrumentisto/coturn:latest
    container_name: pufferblow-coturn
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --realm=${TURN_REALM:-pufferblow.space}
      --user=${PUFFERBLOW_TURN_USERNAME:-pufferblow}:${PUFFERBLOW_TURN_PASSWORD}
      --fingerprint
      --lt-cred-mech
      --no-multicast-peers
      --min-port=49160
      --max-port=49200
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - pufferblow-server-net

  postgres:
    image: postgres:16-alpine
    container_name: pufferblow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pufferblow}
      POSTGRES_USER: ${POSTGRES_USER:-pufferblow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pufferblow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pufferblow} -d ${POSTGRES_DB:-pufferblow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pufferblow-server-net

volumes:
  pufferblow_data:
  pufferblow_postgres:

networks:
  pufferblow-server-net:
    driver: bridge
